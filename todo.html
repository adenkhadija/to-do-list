<!DOCTYPE html>
<html>
    <head>
    
    <link rel="stylesheet" href="todo.css">

    </head>

    <body>
        <div class="container">

        <div class="todo-app">
              <h2>To-Do list</h2>
                <div class="task-bar">
                    <input id="task-input" type="text" placeholder="Add your task" />
                    <button id="add">Add</button>
                  
                </div>

                
                <ul>

                </ul>

       
            </div>
        </div>

      

        <script>
            let addItem = document.getElementById('add'); //NodeObject button
            let Collection = document.getElementsByTagName("input"); // htmlCollecton  
            
            let UlList = document.getElementsByTagName('ul'); 
            let UlNodeObject = UlList[0]
            
            let completed = false; 
            let inputNode = Collection[0]; 

            addItem.addEventListener("click", () =>{
                if (inputNode.value === '') {
                    return 
                }
    
            // what the user entered 
            let userInput = inputNode.value; //string 
            inputNode.value = ''; 


            let txt = document.createTextNode(userInput); // NodeObject
            let list = document.createElement('li');



            // create a element 
           
            // text Node inside the list -- appending 
            list.appendChild(txt)

            UlNodeObject.appendChild(list)

            let xbutton = document.createElement('span'); 
            xbutton.innerHTML = '\u00d7'; 
            list.appendChild(xbutton); 
            xbutton.classList.add('cancel'); 

            // list.style.color = 'red'; 
            list.style.listStyleType = 'none'; 

            list.addEventListener('click', () => {
                completed = !completed; 
                if (completed){ // true
                    list.style.textDecoration = 'line-through';
                    //console.log('text decoration'); 
                }
                else {
                    list.style.textDecoration = 'none'; 
                }
            })

            // click on the x --> remove from the list 

            xbutton.addEventListener('click', () => {
                // add event listener is a method of the nodeObject
                list.remove()

            })



            } )

            //     fontSize:"18px", 
            //     color:"black", 
            //     padding:"20px",
            //     textDecoration:"line-through"
            // }

            //     // target property 
            //     target:addItem
            //e.target = the button because button received the action 
            // }
            // add a new input 

            
    



        </script>
    </body>



</html>
