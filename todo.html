<!DOCTYPE html>
<html>
    <head>
    
    <link rel="stylesheet" href="todo.css">

    </head>

    <body>
        <div class="container">

        <div class="todo-app">
              <h2>To-Do list</h2>
                <div class="task-bar">
                    <input id="task-input" type="text" placeholder="Add your task" />
                    <button id="add">Add</button>
                  
                </div>

                
                <ul>

                </ul>

       
            </div>
        </div>

      

        <script>

            let addItem = document.getElementById('add'); //NodeObject button
            //let Collection = document.getElementsByTagName("input"); // htmlCollecton  
            
            //let UlList = document.getElementsByTagName('ul'); 
            let UlNodeObject = document.querySelector('ul'); 
        
            //let UlNodeObject = UlList[0]; 
            
            let inputNode = document.querySelector('input'); // nodeObject Element

            
            //let userInput = inputNode.value; //string 
            //console.log('user input', userInput); 


            let arrayInput = []; 
            //let xbutton = document.createElement('span'); 


            //let userInput = inputNode.value; //string

            const addTask = () => {
                let userInput = inputNode.value; //string
                arrayInput.push(userInput); 
                //console.log('array', arrayInput); 
                inputNode.value = ''; 
                render(); 
            }
            
            const render = () => {
                UlNodeObject.innerHTML = ""; 

                arrayInput.forEach((item, index, arrayInput) => {
                    console.log()

                    let list = document.createElement('li');

                    let textNodeObject = document.createTextNode(item); 
                    list.appendChild(textNodeObject); 
                    //console.log('textNodeObject',textNodeObject); 

                    UlNodeObject.appendChild(list);
                    
                    let xbutton = document.createElement('span'); 
                    xbutton.textContent = '\u00d7';
                    list.appendChild(xbutton); 
                    xbutton.classList.add('cancel');
                    
                    xbutton.addEventListener('click', (event) => {
                        event.stopPropagation(); 
                        arrayInput.splice(index,1); 
                        render(); 
                        // list.remove()
                        // // not updating the arrayDOM  
                        // console.log('array', arrayInput); 
                      
    
                }

            ); 


                 }); 


                }; 


            addItem.addEventListener('click', () => {
                if (inputNode.value.trim() === '') return; 
                addTask();
            });
            
            inputNode.addEventListener('keydown', (event) =>{
                if (inputNode.value.trim() === '') return;
                else if (event.key === 'Enter') {
                    addTask()
                }

               });       

        </script>
    </body>



</html>
